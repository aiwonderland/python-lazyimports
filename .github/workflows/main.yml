name: Main CLI Check

on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write
jobs:
    check:
      runs-on: ubuntu-latest
  
      steps:
        - name: Checkout code
          uses: actions/checkout@v7
          with:
            fetch-depth: 0
            persist-credentials: false
  
        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version: "3.14"

        - name: Run Tests
          run: python test_lazyimports.py -v
  